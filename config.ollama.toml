# Ollama-only router config.
#
# Routes every request to whichever locally-pulled Ollama model matches
# `model` in the request. The "discover" rule queries /api/tags at startup
# to learn what's pulled (run `ollama list` to see/update that set):
#   carter-hire:latest, phi3:mini, gpt-oss:latest, gpt-oss:20b,
#   llama3.1:8b, deepseek-r1:latest, gemma3:latest
#
# Usage: cargo run -- config.ollama.toml

[server]
host        = "127.0.0.1"
port        = 8090
dashboard   = true
api_key_env = "ROUTER_API_KEY"

[logging]
enabled = true
path    = "logs/requests.jsonl"

# ── providers ─────────────────────────────────────────────────────────────────

# Ollama native API — base_url has no /v1 suffix.
[[providers]]
name                      = "ollama"
format                    = "ollama"
base_url                  = "http://localhost:11434"
cost_per_1m_tokens        = 0.0
quality                   = 75
latency_ms                = 600
throughput_tokens_per_sec = 30

# ── routers (first match wins) ────────────────────────────────────────────────

# Resolve to "ollama" whenever the requested model is one Ollama has pulled.
[[routers]]
type     = "discover"
provider = "ollama"

# Anything not discovered (e.g. a typo'd model name) still gets sent to
# ollama rather than failing outright.
[[routers]]
type          = "random"
providers     = ["ollama"]
rewrite_model = "llama3.1:8b"
