name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: |
          OIDC_TOKEN=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=crates.io" | jq -r '.value')
          CARGO_TOKEN=$(curl -sSf -X POST https://crates.io/api/v1/trusted_publishing/tokens \
            -H "Content-Type: application/json" \
            -d "{\"jwt\": \"$OIDC_TOKEN\"}" | jq -r '.token')
          cargo publish --token "$CARGO_TOKEN"
